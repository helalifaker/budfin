# Development overrides - use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - '443:443'
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://app_user:${DB_PASSWORD:-changeme}@db:5432/budfindb
      LOG_LEVEL: debug
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: budfindb
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app_user -d budfindb']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
